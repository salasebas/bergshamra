# SoftHSM2 config TEMPLATE for bergshamra HSM integration tests.
#
# This committed file is a reference only and is NOT read by the tests.
# `hsm-test/setup.sh` generates `hsm-test/softhsm2.local.conf` (gitignored) with
# an absolute `directories.tokendir` pointing at this checkout's
# `hsm-test/tokens/`; the justfile and the integration test read that generated
# file via SOFTHSM2_CONF. Always run `bash hsm-test/setup.sh` before the HSM
# tests. SoftHSM2 does not expand environment variables and resolves a relative
# tokendir against the current working directory, which is why the real config
# must be generated with an absolute path rather than committed.
directories.tokendir = ./hsm-test/tokens
objectstore.backend = file
log.level = INFO
