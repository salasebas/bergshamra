# SoftHSM2 config for bergshamra HSM integration tests.
#
# `hsm-test/setup.sh` REGENERATES this file with an absolute `directories.tokendir`
# pointing at this checkout's `hsm-test/tokens/`. SoftHSM2 does not expand
# environment variables and resolves a relative tokendir against the current
# working directory, so the committed default below is only a portable
# placeholder — always run `bash hsm-test/setup.sh` before the HSM tests.
directories.tokendir = ./hsm-test/tokens
objectstore.backend = file
log.level = INFO
