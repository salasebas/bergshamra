name: Publish

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

# Note on crates.io publishing
# -----------------------------
# The workspace now resolves all dependencies from crates.io — including
# kryptering (>=0.3) and tsp-ltv (>=0.2), which were previously local `path`
# deps that blocked `cargo publish`. The crates are therefore crates.io-
# publishable, but this workflow currently only cuts a GitHub Release. To push
# the member crates to crates.io, add a `publish-crate` job that runs
# `cargo publish` for each crate in dependency order (core → xml → c14n →
# crypto → keys → transforms → dsig/enc → bergshamra); see
# kryptering/.github/workflows/publish.yml for the shape.

jobs:
  # Sanity: the workspace must compile & test from a fresh checkout of the
  # tagged commit before we advertise a release.
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cargo cache
        uses: Swatinem/rust-cache@v2

      - name: Verify tag matches workspace version
        run: |
          version=$(cargo metadata --no-deps --format-version 1 \
            | jq -r '.workspace_members[0]' \
            | awk '{print $2}')
          if [ "v${version}" != "${GITHUB_REF_NAME}" ]; then
            echo "Tag ${GITHUB_REF_NAME} does not match workspace version v${version}" >&2
            exit 1
          fi

      - name: Build workspace
        run: cargo build --locked --workspace --all-features

      - name: Test workspace
        run: cargo test --locked --workspace --all-features --lib

  release:
    needs: verify
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
